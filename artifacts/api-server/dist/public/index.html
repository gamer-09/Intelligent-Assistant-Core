<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yang — AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #6c8fff;
      --accent-dim:#3a4f99;
      --text:      #e2e4ed;
      --text-muted:#6b7280;
      --user-bg:   #2563eb;
      --yang-bg:   #1e2235;
      --code-bg:   #0d1117;
      --radius:    12px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff; letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header .sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-left: auto; flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn 0.18s ease;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .avatar.yang { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; }
    .avatar.user { background: var(--user-bg); color: #fff; }

    .bubble {
      max-width: min(72%, 560px);
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14.5px;
      word-break: break-word;
    }
    .bubble.yang {
      background: var(--yang-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .bubble.user {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Markdown-style content inside bubbles */
    .bubble strong { font-weight: 600; }
    .bubble em     { font-style: italic; }
    .bubble a      { color: var(--accent); text-decoration: none; }
    .bubble a:hover{ text-decoration: underline; }

    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 10px 0 4px;
      font-size: 13px;
    }
    .bubble code {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
    }
    .bubble p:not(:last-child) { margin-bottom: 8px; }
    .bubble ul, .bubble ol { padding-left: 18px; }
    .bubble li { margin: 3px 0; }

    .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 6px;
    }
    .msg-row.user .meta { text-align: right; }

    /* Tool badge */
    .tool-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: #c7d2fe;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .welcome .big { font-size: 36px; margin-bottom: 8px; }
    .welcome h2   { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .welcome p    { font-size: 14px; line-height: 1.6; max-width: 380px; margin: 0 auto; }
    .suggestions  { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
    .suggestion   {
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 13px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .suggestion:hover { border-color: var(--accent); background: var(--yang-bg); }

    /* ── Input area ── */
    #input-area {
      padding: 12px 16px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 8px 6px 14px;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14.5px;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      padding: 6px 0;
    }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border: none; border-radius: 8px;
      background: var(--accent); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, opacity 0.15s;
    }
    #send-btn:hover  { background: #5a78ff; }
    #send-btn:active { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-btn svg { width: 16px; height: 16px; }

    .hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <div class="logo">Y</div>
  <div>
    <h1>Yang</h1>
    <div class="sub">Self-contained AI assistant</div>
  </div>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="big">✦</div>
    <h2>I'm Yang</h2>
    <p>A fully local AI assistant. No cloud, no API keys — everything runs on your machine.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="sendSuggestion(this)">What can you do?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">What is 15% of 240?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Write a Python function to reverse a string</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Search for latest news about AI</button>
      <button class="suggestion" onclick="sendSuggestion(this)">What is the speed of light?</button>
      <button class="suggestion" onclick="sendSuggestion(this)">Explain recursion like I'm 5</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Message Yang…" autocomplete="off"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
</div>

<script>
  const API = '/api/chat';
  const sessionId = 'session-' + Math.random().toString(36).slice(2);
  let busy = false;

  // Auto-resize textarea
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 140) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // ── Render helpers ──────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    // Protect code blocks
    const codeBlocks = [];
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      codeBlocks.push({ lang, code });
      return `\x00CODE${codeBlocks.length - 1}\x00`;
    });

    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold / italic
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Links
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Bare URLs
    text = text.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');

    // Bullet lists
    text = text.replace(/((?:^- .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
      return `<ul>${items}</ul>`;
    });

    // Numbered lists
    text = text.replace(/((?:^\d+\. .+\n?)+)/gm, m => {
      const items = m.trim().split('\n').map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('');
      return `<ol>${items}</ol>`;
    });

    // Paragraphs (double newlines)
    text = text.split('\n\n').map(p => p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '').join('');

    // Restore code blocks
    text = text.replace(/\x00CODE(\d+)\x00/g, (_, i) => {
      const { lang, code } = codeBlocks[parseInt(i)];
      return `<pre><code class="lang-${escapeHtml(lang)}">${escapeHtml(code)}</code></pre>`;
    });

    return text || escapeHtml(text);
  }

  // ── DOM helpers ─────────────────────────────────────────────────────────────

  function addMessage(role, text, meta = '') {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'yang' ? 'Y' : 'U';

    const wrap = document.createElement('div');

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;

    if (role === 'yang') {
      bubble.innerHTML = renderMarkdown(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(bubble);

    if (meta) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.innerHTML = meta;
      wrap.appendChild(m);
    }

    row.appendChild(avatar);
    row.appendChild(wrap);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.id = 'typing-indicator';
    row.className = 'msg-row yang typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar yang';
    avatar.textContent = 'Y';

    const bubble = document.createElement('div');
    bubble.className = 'bubble yang';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  // ── Send ────────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || busy) return;

    busy = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        addMessage('yang', `⚠️ Error ${res.status}: ${err.error || res.statusText}`);
        return;
      }

      const data = await res.json();
      const toolBadge = data.toolUsed && data.tool
        ? `<span class="tool-badge">🔧 ${data.tool}</span>`
        : '';
      const time = new Date(data.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      addMessage('yang', data.message, `${time}${toolBadge}`);

    } catch (err) {
      removeTyping();
      addMessage('yang', `⚠️ Could not reach the server. Is it running?\n\n${err.message}`);
    } finally {
      busy = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  function sendSuggestion(btn) {
    document.getElementById('user-input').value = btn.textContent;
    sendMessage();
  }

  // Focus on load
  window.addEventListener('load', () => {
    document.getElementById('user-input').focus();
  });
</script>
</body>
</html>
